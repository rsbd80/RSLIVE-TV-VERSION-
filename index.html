<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Live TV App</title>
</head>
<body>
    <!-- নোটিশ বার -->
    <div class="notice-bar">
        <marquee>সরাসরি খেলা দেখতে আমাদের টেলিগ্রাম গ্রুপে জয়েন করুন: <a href="https://t.me/yourgroup" target="_blank">Join Telegram</a></marquee>
    </div>

    <header>
        <h1>Live TV</h1>
        <input type="text" id="searchBar" placeholder="চ্যানেল সার্চ করুন..." onkeyup="filterChannels()">
    </header>

    <div class="main-container">
        <!-- সাইডবার (পিসির জন্য) -->
        <aside class="sidebar" id="categoryMenu">
            <button onclick="filterByCategory('All')">সব চ্যানেল</button>
            <button onclick="filterByCategory('Sports')">স্পোর্টস</button>
            <button onclick="filterByCategory('News')">নিউজ</button>
        </aside>

        <!-- ভিডিও এবং চ্যানেল লিস্ট -->
        <main>
            <div id="videoPlayer"> ভিডিও এখানে লোড হবে </div>
            <div id="channelGrid" class="grid"></div>
        </main>
    </div>

    <footer>
        <p>যোগাযোগ: <a href="https://t.me/yourgroup">Telegram Group</a></p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
